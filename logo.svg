<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="topArc" d="M 55,205 A 145,145 0 0 1 345,205" fill="none"/>
    <path id="bottomArc" d="M 335,220 A 135,135 0 0 1 65,220" fill="none"/>
  </defs>

  <!-- anello esterno singolo, essenziale -->
  <circle cx="200" cy="200" r="184" fill="none" stroke="#191A17" stroke-width="1.5"/>

  <!-- testo arcuato superiore -->
  <text font-family="'IBM Plex Mono', monospace" font-size="21" letter-spacing="5.5" fill="#191A17">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">STEFANO RUFFINI</textPath>
  </text>

  <!-- testo arcuato inferiore -->
  <text font-family="'IBM Plex Mono', monospace" font-size="17" letter-spacing="9" fill="#A9834D">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">PHOTOGRAPHY</textPath>
  </text>

  <!-- fotocamera, disegno a linea pulita -->
  <g transform="translate(200,210)" fill="none" stroke="#191A17" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round">
    <rect x="-58" y="-26" width="116" height="74" rx="7"/>
    <rect x="-22" y="-44" width="46" height="20" rx="3"/>
    <circle cx="0" cy="12" r="28"/>
    <circle cx="0" cy="12" r="15"/>
    <circle cx="42" cy="-30" r="5" fill="#A9834D" stroke="none"/>
  </g>
</svg>
